name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint example schemas
        run: |
          schemalattice lint examples/order.sl.yaml
          schemalattice lint examples/user_activity_event.sl.yaml --strict

      - name: Run test suite
        run: pytest tests/ -v

      - name: Generate all targets for every example schema (smoke test)
        run: |
          for f in examples/*.sl.yaml; do
            echo "generating from $f"
            schemalattice generate "$f" -o /tmp/out/
          done

  diff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Verify example evolution schemas are classified correctly
        run: |
          # order_v2_safe must NOT be reported as breaking
          schemalattice diff examples/evolution/order_v1.sl.yaml \
                              examples/evolution/order_v2_safe.sl.yaml \
                              --fail-on-breaking
          # order_v2_breaking MUST be reported as breaking (job should fail here)
          if schemalattice diff examples/evolution/order_v1.sl.yaml \
                                examples/evolution/order_v2_breaking.sl.yaml \
                                --fail-on-breaking; then
            echo "expected order_v2_breaking.sl.yaml to be flagged as breaking, but it wasn't"
            exit 1
          fi
